services:
  db:
    image: mysql:8.4
    container_name: ci4-db
    environment:
      MYSQL_ROOT_PASSWORD: myJBM1985
      MYSQL_DATABASE: vitorrefrigeracao.com.br
      TZ: America/Sao_Paulo
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    image: studio/ci4-app:php83
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ci4-app
    working_dir: /var/www
    volumes:
      - ./:/var/www
    environment:
      - TZ=America/Sao_Paulo
    depends_on:
      db:
        condition: service_healthy

  web:
    image: studio/vitorrefrigeracao-ci4-web:apache24-v1
    build:
      context: .
      dockerfile: docker/apache/Dockerfile
    container_name: ci4-web
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/apache/vhost.conf:/usr/local/apache2/conf/extra/vitor.conf:ro
    depends_on:
      - app

volumes:
  db_data:
    name: vitorrefrigeracaocombr_db_data
